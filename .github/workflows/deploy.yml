# 🌰 Bridge Security Monitor — GitHub Actions Workflow
# Runs weekly to:
#   1. Fetch live bridge data from DeFiLlama API
#   2. Generate AI intelligence brief via GitHub Models (gpt-4o-mini)
#   3. Deploy dashboard to GitHub Pages
#
# 🌰 No external API keys required!
#   - DeFiLlama is a free, public API
#   - GitHub Models uses the built-in GITHUB_TOKEN
#   - GitHub Pages uses the built-in GITHUB_TOKEN

name: 🌰 Update Bridge Data & Deploy

on:
  # 🌰 Run every Monday at 00:00 UTC (weekly update)
  schedule:
    - cron: "0 0 * * 1"

  # 🌰 Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      skip_report:
        description: "Skip AI report generation"
        required: false
        default: "false"

  # 🌰 Also deploy on pushes to main (for dashboard updates)
  push:
    branches:
      - main

# 🌰 Required permissions for GitHub Pages deploy
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # =============================================
  # 🌰 JOB 1: Fetch bridge data + generate report
  # =============================================
  fetch-and-report:
    name: 🌰 Fetch Data & Generate AI Report
    runs-on: ubuntu-latest

    steps:
      - name: 🌰 Checkout repository
        uses: actions/checkout@v4

      - name: 🌰 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🌰 Fetch live bridge data from DeFiLlama
        run: node scripts/api-call.js
        # 🌰 No API key needed for DeFiLlama!

      - name: 🌰 Generate AI intelligence brief
        if: ${{ github.event.inputs.skip_report != 'true' }}
        run: node scripts/generate-report.js
        env:
          # 🌰 GITHUB_TOKEN is automatically available in Actions
          # It grants access to GitHub Models API (gpt-4o-mini)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🌰 Commit updated data files
        run: |
          git config user.name "🌰 Bridge Security Bot"
          git config user.email "bridge-bot@github-actions"
          git add data/bridges.json data/report.json data/report.md || true
          git diff --staged --quiet || git commit -m "🌰 Weekly update: bridge data + AI report $(date -u '+%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================
  # 🌰 JOB 2: Deploy to GitHub Pages
  # =============================================
  deploy-pages:
    name: 🌰 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: fetch-and-report

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🌰 Checkout repository (with fresh data)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 🌰 Set up GitHub Pages
        uses: actions/configure-pages@v4

      - name: 🌰 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 🌰 Deploy entire repo root (index.html + data/ + assets/)
          path: "."

      - name: 🌰 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
