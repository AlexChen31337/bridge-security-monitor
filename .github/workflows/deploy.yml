name: 🌰 BridgeWatch — Weekly Update & Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 🌰 Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🌰 Fetch bridge data (DeFiLlama)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/fetch-bridge-data.js

      - name: 🌰 Generate AI brief (GitHub Models)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: node scripts/generate-brief.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🌰 Commit updated data
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          git config --local user.email "bridgewatch-bot@users.noreply.github.com"
          git config --local user.name "BridgeWatch 🌰"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "🌰 Weekly update — $(date -u '+%Y-%m-%d')"
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌰 Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌰 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
