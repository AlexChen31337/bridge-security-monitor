# 🌰 Bridge Security Monitor — Weekly Update & Deploy
name: 🌰 Update Bridge Data & Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 8 * * 1'  # 🌰 Every Monday 08:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 🌰 Checkout
        uses: actions/checkout@v4

      - name: 🌰 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🌰 Fetch bridge data (DeFiLlama)
        run: node scripts/api-call.js

      - name: 🌰 Generate AI intelligence brief (GitHub Models)
        run: node scripts/generate-report.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🌰 Commit updated data
        run: |
          git config --local user.email "bridge-bot@users.noreply.github.com"
          git config --local user.name "🌰 Bridge Security Bot"
          git add data/
          if ! git diff --staged --quiet; then
            git commit -m "🌰 Weekly data update — $(date -u '+%Y-%m-%d')"
            git pull --rebase || true
            git push
          fi

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🌰 Checkout (with latest data from update job)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: 🌰 Setup Pages
        uses: actions/configure-pages@v5

      - name: 🌰 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌰 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
